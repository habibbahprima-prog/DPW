<!DOCTYPE html>
<html>
<head>
    <title>Coba Input - Latihan 1</title>
</head>
<body>
    <h2>Berbagai Tipe Input HTML</h2>
    <form>
        <label>Input Text:</label><br>
        <input type="text" name="nama"><br><br>

        <label>Input Password:</label><br>
        <input type="password" name="sandi"><br><br>

        <label>Input Radio (Pilih satu):</label><br>
        <input type="radio" name="jk" value="L"> Laki-laki
        <input type="radio" name="jk" value="P"> Perempuan<br><br>

        <label>Input Checkbox (Pilih banyak):</label><br>
        <input type="checkbox" name="hobi" value="Membaca"> Membaca
        <input type="checkbox" name="hobi" value="Olahraga"> Olahraga<br><br>

        <label>Input Color:</label><br>
        <input type="color" name="warna_favorit"><br><br>

        <label>Input Date:</label><br>
        <input type="date" name="tanggal_lahir"><br><br>

        <label>Input Email:</label><br>
        <input type="email" name="surel"><br><br>

        <label>Input File:</label><br>
        <input type="file" name="berkas"><br><br>

        <label>Input Range (0-100):</label><br>
        <input type="range" name="skala" min="0" max="100"><br><br>

        <input type="submit" value="Kirim">
        <input type="reset" value="Batal">
    </form>
</body>
</html>
