<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pembelajaran CSS dengan ID</title>
    <link rel="stylesheet" href="style/style2.css">
</head>
<body>
    <p>Paragraf pertama ini menggunakan gaya default dari selektor tag p pada CSS.</p>

    <p class="group">Paragraf kedua memakai class "group" yang memberikan warna teks merah serta background biru.</p>

    <p id="one">Paragraf ketiga menggunakan ID "one", yang memiliki tingkat prioritas lebih tinggi dengan latar belakang putih.</p>
</body>
</html>
