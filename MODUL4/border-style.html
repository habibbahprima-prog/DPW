<!DOCTYPE html>
<html>
<head>
    <title>Belajar Border Style</title>
    <style>
        /* Border paragraf + ukuran */
        p.dotted { border: 3px dotted black; }
        p.dashed { border: 4px dashed black; }
        p.solid  { border: 5px solid black; }
        p.double { border: 6px double black; }
        p.groove { border: 6px groove black; }
        p.ridge  { border: 6px ridge black; }
        p.inset  { border: 6px inset black; }
        p.outset { border: 6px outset black; }
        p.none   { border: none; }

        /* Border span + ukuran */
        span.dotted { border: 2px dotted red; }
        span.outset { border: 4px outset blue; }
        span.ridge  { border: 4px ridge green; }
        span.inset  { border: 4px inset purple; }
    </style>
</head>
<body>

    <h2>Macam-macam style border pada paragraf</h2>
    <p class="dotted">Border titik-titik.</p>
    <p class="dashed">Border garis putus-putus.</p>
    <p class="solid">Border garis utuh.</p>
    <p class="double">Border garis ganda.</p>
    <p class="groove">Border efek groove.</p>
    <p class="none">Tanpa border.</p>

    <hr>

    <h2>Macam-macam style border pada span</h2>
    <span class="ridge">Border ridge (span).</span><br><br>
    <span class="inset">Border inset (span).</span><br><br>
    <span class="dotted">Border dotted (span).</span><br><br>
    <span class="outset">Border outset (span).</span>

</body>
</html>
