<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Basic Dialog jQuery</title>

    <!-- jQuery & jQuery UI -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #dialog {
            display: none;
        }
    </style>
</head>

<body>

    <h2>Contoh Basic Dialog jQuery</h2>

    <button id="bukaDialog">Tampilkan Dialog</button>

    <!-- Isi Dialog -->
    <div id="dialog" title="Pesan Informasi">
        <p>Halo! Ini adalah contoh jendela dialog sederhana menggunakan jQuery UI.</p>
    </div>

    <script>
        $(function () {
            // Inisialisasi dialog
            $("#dialog").dialog({
                autoOpen: false,
                modal: true,
                width: 300
            });

            // Event tombol untuk membuka dialog
            $("#bukaDialog").click(function () {
                $("#dialog").dialog("open");
            });
        });
    </script>

</body>
</html>
